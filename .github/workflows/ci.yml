name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  validate-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint Game.html
        run: npx --yes htmlhint@latest Game.html
