name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  validate-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint Game.html
        run: npm run lint

      - name: Run tests
        run: npm test
